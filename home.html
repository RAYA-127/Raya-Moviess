<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYA Movies | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
   
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: url('a.jpg') no-repeat center center fixed;
    background-size: cover; 
    height: 100vh;
    color: white;
    overflow: hidden; 
}


header {
    padding: 20px 5% 0;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-name {
    font-weight: 800;
    line-height: 1;
    color: #a0afb3;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.mini-logo {
    width: 45px;
    border-radius: 50%;
    border: 1px solid #ffffff;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 50px;
}

nav a {
    text-decoration: none;
    color: white;
    font-weight: 400;
    transition: 0.3s;
}

nav a:hover, nav a.active {
    color: #ffffff;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}


.hero-section {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.glass-card {
    background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 50px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
}

.main-logo {
    width: 140px;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

p {
    margin-bottom: 30px;
    opacity: 0.8;
}


.shiny-btn {
    display: inline-block;
    padding: 15px 45px;
    background: linear-gradient(45deg, #000000, #141313);
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 50px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
}

.shiny-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(235, 250, 253, 0.6);
}

.arrow {
    margin-left: 8px;
    transition: 0.3s;
}

.shiny-btn:hover .arrow {
    margin-left: 15px;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
background: linear-gradient(45deg, #434343, #000000);  color: white;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 10px;
}

/* 1. Hide Hamburger on Desktop */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 4px;
 
}

.hamburger span {
  width: 25px;
  height: 3px;
  background-color: white;
}
.home{
    color:white;
  }
  .about{
    color:white;
  }
  .terms {
    color:white;
  }
  .home:hover{
    background-color:black;
    color:white;box-shadow:4px 5px black;
    border-radius:10px;
  }

    .about:hover{
    background-color:black;
    color:white;
    border-radius:5px;
    box-shadow:4px 5px black;
    width:40px;
  }
    .terms:hover{
    background-color:black;
    color:white;box-shadow:4px 5px black;
    border-radius:10px;
  }

/* 2. Mobile Styles (Media Query) */
@media (max-width: 768px) {
  .hamburger {
    display: flex; /* Show hamburger on mobile */
  }

  .nav-links {
    display: none; /* Hide links by default on mobile */
    flex-direction: column;
    position: absolute;
    top: 70px;
    right: 0;
    margin-top:20px;
    border-radius:70px;
background: linear-gradient(45deg, #434343, #000000);    width: 100%;
    text-align: center;
    padding: 20px 0;
  }
  .home{
    color:white;
  }
  .about{
    color:white;
  }
  .terms {
    color:white;
  }
  .home:hover{
    background-color:black;
    color:white;box-shadow:4px 5px black;
    border-radius:10px;
  }

    .about:hover{
    background-color:black;
    color:white;
    border-radius:5px;
    box-shadow:4px 5px black;
    width:40px;
  }
    .terms:hover{
    background-color:black;
    color:white;box-shadow:4px 5px black;
    border-radius:10px;
  }

  /* 3. The 'Active' class (Controlled by JS) */
  .nav-links.active {
    display: flex; /* Shows the menu when clicked */
  }
}
</style>
<body>

    <header>
        <div class="navbar">
            <div class="brand">
                <img src="raya.jpg" alt="Raya Logo" class="mini-logo">
                <span class="brand-name">RAYA <br> MOVIES</span>
            </div>
          

   
             <nav class="navbar">
  

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <ul class="nav-links" id="nav-links">
    <li><a href="index1.html" class="home">Home</a></li>
    <li><a href="about.html" class="about">About</a></li>
    <li><a href="terms.html" class="terms">Terms & Conditions</a></li>
  </ul>
</nav>
         

            
    </header>

    <section class="hero-section">
        <div class="glass-card">
            <div class="logo-container">
                <img src="raya.jpg" alt="RAYA Movies Logo" class="main-logo">
            </div>
            <h1>RAYA Movies</h1>
            <p>Experience cinema like never before.</p>
            
            <a href="home.html" class="shiny-btn">
                Click here <span class="arrow">→</span>
            </a>
        </div>
    </section>



</body>
<script>
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');

hamburger.addEventListener('click', () => {
  // This line adds 'active' if it's missing, and removes it if it's there
  navLinks.classList.toggle('active');
});

</script>
</html>
