.butterfly {

    animation: fly 4s infinite linear;
}

.wing {
    position: absolute;
    width: 50px;
    height: 50px;
    background-color: #ff00ff;
    border-radius:100% 100% 40% 40%;
    opacity: 0.1;
}
.left {
    left: 0;
   transform-origin: right center;
   animation: flap-left 0.5s infinite ;
   
}
.right {
    right: 0;
    transform-origin:left center;
    animation :right 0.5s infinite ease-in-out;
}
.butterfly-container {
    width: 40px;

@keyframes flap-left {
    0% , 100% {
        transform: rotateY(9deg);
    }
    50% {

    }
    }

    @keyframes right {

  100% {
